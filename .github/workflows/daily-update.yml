# 평일 03:17 KST — 전일 장 마감 데이터 수집 (Supabase 직접 반영)
# KOSPI / KOSDAQ 병렬 수집, PER/PBR 생략, ingest 후 스냅샷·백분위 계산
#
# GitHub Secrets:
#   SUPABASE_DB_PASSWORD, KRX_ID, KRX_PW
#   DART_API_KEY (선택 — fetch_dart_overview weekly job)
#
# 스케줄 참고:
#   GitHub Actions cron은 UTC. `17 18 * * 0-5` = KST 03:17 (월~토).
#   전일 18:17 UTC → 당일 03:17 KST. ingest 1~2h → 5~6시 전후 완료 목표.
#   GitHub 지연 1~2h 가능 — 정각(:00) 피하려 :17 사용.

name: Daily data update

on:
  schedule:
    # 03:17 KST = 18:17 UTC(전일), 월~토 (금요일 장 → 토요일 아침 확인)
    - cron: "17 18 * * 0-5"
  workflow_dispatch:

concurrency:
  group: daily-data-update
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure DATABASE_URL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python <<'PY'
          import os
          from urllib.parse import quote

          password = os.environ.get("SUPABASE_DB_PASSWORD", "").strip()
          if not password:
              raise SystemExit("SUPABASE_DB_PASSWORD secret이 없습니다.")

          encoded = quote(password, safe="")
          ref = "pcdhshflarandsdwuddb"
          host = "aws-1-ap-northeast-2.pooler.supabase.com"
          url = (
              f"postgresql://postgres.{ref}:{encoded}@{host}:5432/postgres"
              "?options=-c%20statement_timeout%3D0"
          )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"DATABASE_URL={url}\n")
          PY

      - name: Ensure DB schema
        run: python scripts/ensure_schema.py

      - name: Sync stock master
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scripts/sync_stocks.py --market ALL

  ingest:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        market: [KOSPI, KOSDAQ]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure DATABASE_URL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python <<'PY'
          import os
          from urllib.parse import quote

          password = os.environ.get("SUPABASE_DB_PASSWORD", "").strip()
          if not password:
              raise SystemExit("SUPABASE_DB_PASSWORD secret이 없습니다.")

          encoded = quote(password, safe="")
          ref = "pcdhshflarandsdwuddb"
          host = "aws-1-ap-northeast-2.pooler.supabase.com"
          url = (
              f"postgresql://postgres.{ref}:{encoded}@{host}:5432/postgres"
              "?options=-c%20statement_timeout%3D0"
          )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"DATABASE_URL={url}\n")
          PY

      - name: Ingest ${{ matrix.market }}
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/ingest.py \
            --market ${{ matrix.market }} \
            --days 14 \
            --delay 0.25 \
            --skip-fundamentals \
            --skip-snapshots

  finalize:
    needs: ingest
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure DATABASE_URL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python <<'PY'
          import os
          from urllib.parse import quote

          password = os.environ.get("SUPABASE_DB_PASSWORD", "").strip()
          if not password:
              raise SystemExit("SUPABASE_DB_PASSWORD secret이 없습니다.")

          encoded = quote(password, safe="")
          ref = "pcdhshflarandsdwuddb"
          host = "aws-1-ap-northeast-2.pooler.supabase.com"
          url = (
              f"postgresql://postgres.{ref}:{encoded}@{host}:5432/postgres"
              "?options=-c%20statement_timeout%3D0"
          )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"DATABASE_URL={url}\n")
          PY

      - name: Compute percentiles and TOP10 snapshots
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/compute_snapshots.py
          python scripts/backfill_foreign_net.py
          python scripts/compute_investor_snapshots.py

  dart-overview:
    needs: finalize
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure DATABASE_URL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python <<'PY'
          import os
          from urllib.parse import quote

          password = os.environ.get("SUPABASE_DB_PASSWORD", "").strip()
          if not password:
              raise SystemExit("SUPABASE_DB_PASSWORD secret이 없습니다.")

          encoded = quote(password, safe="")
          ref = "pcdhshflarandsdwuddb"
          host = "aws-1-ap-northeast-2.pooler.supabase.com"
          url = (
              f"postgresql://postgres.{ref}:{encoded}@{host}:5432/postgres"
              "?options=-c%20statement_timeout%3D0"
          )

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"DATABASE_URL={url}\n")
          PY

      - name: Fetch DART company overviews (missing only, batch 100)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          if [ -z "$DART_API_KEY" ]; then
            echo "DART_API_KEY secret 없음 — 스킵"
            exit 0
          fi
          python scripts/fetch_dart_overview.py --missing-only --limit 100 --delay 0.2
